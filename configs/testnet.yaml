# Testnet environment configuration
# RFQ testnet: https://testnet.rfq.injective.network (swagger: /swagger/)
environment: testnet

chain:
  grpc_endpoint: "testnet-grpc.injective.dev:443"
  # Sentry LCD: used for mark price (v2 derivative markets) and chain queries
  lcd_endpoint: "https://testnet.sentry.lcd.injective.network"
  chain_id: "injective-888"
  # EVM chain ID for the EIP-712 v2 domain separator (NOT the cosmos chain_id).
  # Testnet and devnet share 1439; mainnet will be 1776.
  evm_chain_id: 1439
  tx_timeout_seconds: 10

# RFQ Indexer API (testnet). Server is gRPC-over-WS; path = /injective_rfq_rpc.InjectiveRfqRPC/<Method> (see indexer proto).
# Client appends /MakerStream or /TakerStream to ws_endpoint.
indexer:
  ws_endpoint: "wss://testnet.rfq.ws.injective.network/injective_rfq_rpc.InjectiveRfqRPC"
  http_endpoint: "https://testnet.rfq.injective.network"
  grpc_endpoint: "testnet.rfq.grpc.injective.network:443"
  grpc_web_endpoint: "https://testnet.rfq.grpc.injective.network/injective_rfq_rpc.InjectiveRfqRPC"

contract:
  address: "inj1qw7jk82hjvf79tnjykux6zacuh9gl0z0wl3ruk"

# Testnet derivative markets. Mark price: .../injective/exchange/v2/derivative/markets/{id}
markets:
  - id: "0xdc70164d7120529c3cd84278c98df4151210c0447a65a2aab03459cf328de41e"
    symbol: "INJ/USDC PERP"
    base: "INJ"
    quote: "USDC"
    price_source: "oracle"
    min_quantity: 1.0
  - id: "0xfd704649cf3a516c0c145ab0111717c44640d8dbe52a462ae35cadf2f6df1515"
    symbol: "BTC/USDC PERP"
    base: "BTC"
    quote: "USDC"
    price_source: "oracle"
    min_quantity: 0.001
  - id: "0xdbb9bb072015238096f6e821ee9aab7affd741f8662a71acc14ac30ee6b687a5"
    symbol: "LINK/USDC PERP"
    base: "LINK"
    quote: "USDC"
    price_source: "oracle"
    min_quantity: 0.1
  - id: "0x135de28700392fb1c17d40d5170a74f30055a4ad522feddafec42fbbbb780897"
    symbol: "ETH/USDC PERP"
    base: "ETH"
    quote: "USDC"
    price_source: "oracle"
